<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <title>Management RQ Kamila V3</title>
    
    <!-- PWA Meta Tags & Web App Manifest -->
    <meta name="description" content="Aplikasi Manajemen Rumah Qur'an Kamila (Progressive Web App)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2563EB" />
    <!-- manifest.json akan kita isi di Bagian 12 -->
    <!-- <link rel="manifest" href="pwa/manifest.json" /> -->

    <!-- Google Fonts: Poppins & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <!-- CSS Internal Utama -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

    <!-- CONTAINER UTAMA -->
    <div class="layout-wrap">
        <div class="layout" aria-label="Holy Grail Management RQ">
            
            <!-- REGION: HEADER -->
            <header class="region region--header">
                <!-- <span class="region__tag">HEADER</span> (Dihapus untuk versi production) -->
                
                <div class="header__brand">
                    <span class="material-symbols-rounded header__logo">menu_book</span>
                    <h1 class="header__title">RQ Kamila</h1>
                </div>
                
                <div class="sk--spacer"></div> <!-- Pendorong ke kanan -->
                
                <div class="header__info">
                    <span class="header__date" id="current-date">--/--/----</span>
                    <button class="icon-btn" aria-label="Notifikasi">
                        <span class="material-symbols-rounded">notifications</span>
                    </button>
                    <div class="header__profile">
                        <span class="material-symbols-rounded">account_circle</span>
                        <span class="header__username">Admin</span>
                    </div>
                </div>
            </header>

            <!-- REGION: NAV (Sub-navigasi / Breadcrumbs) -->
            <nav class="region region--nav" id="top-nav">
                <span class="material-symbols-rounded sk--dim" style="font-size: 1.2rem;">home</span>
                <span style="font-size: 0.9rem; font-weight: 500; color: #fff;">/ Dashboard</span>
            </nav>

            <!-- REGION: ASIDE LEFT (Menu Utama) -->
            <aside class="region region--aside-left">
                <div class="region__body menu-container">
                    <p class="menu-title">MENU UTAMA</p>
                    
                    <a href="#dashboard" class="menu-item active" id="menu-dashboard">
                        <span class="material-symbols-rounded">dashboard</span>
                        <span>Dashboard</span>
                    </a>
                    
                    <a href="#santri" class="menu-item" id="menu-santri">
                        <span class="material-symbols-rounded">group</span>
                        <span>Data Santri</span>
                    </a>
                    
                    <a href="#harian" class="menu-item" id="menu-harian">
                        <span class="material-symbols-rounded">edit_document</span>
                        <span>Input Harian</span>
                    </a>
                    
                    <p class="menu-title" style="margin-top: 1rem;">SISTEM</p>
                    
                    <a href="#laporan" class="menu-item" id="menu-laporan">
                        <span class="material-symbols-rounded">analytics</span>
                        <span>Laporan</span>
                    </a>
                    
                    <a href="#setting" class="menu-item" id="menu-setting">
                        <span class="material-symbols-rounded">settings</span>
                        <span>Pengaturan</span>
                    </a>
                </div>
            </aside>

            <!-- REGION: MAIN (Area Dinamis yang akan berubah-ubah) -->
            <main class="region region--main" id="main-content">
                <div class="region__body">
                    <!-- SKELETON BAWAAN (Loading state) -->
                    <span class="sk-row sk-row--between">
                        <span class="sk sk--bar sk--w-60"></span>
                        <span class="sk sk--pill"></span>
                    </span>
                    <span class="sk sk--bar sk--w-40 sk--dim"></span>
                    <br>
                    <span class="sk-row">
                        <span class="sk sk--card sk--grow"></span>
                        <span class="sk sk--card sk--grow"></span>
                        <span class="sk sk--card sk--grow"></span>
                    </span>
                    <span class="sk sk--chart"></span>
                </div>
            </main>

            <!-- REGION: ASIDE RIGHT (Widget / Asisten) -->
            <aside class="region region--aside-right">
                <div class="region__body">
                    <p class="menu-title">AKSES CEPAT</p>
                    <button class="btn-action">
                        <span class="material-symbols-rounded">person_add</span>
                        Tambah Santri
                    </button>
                    <button class="btn-action">
                        <span class="material-symbols-rounded">calendar_add_on</span>
                        Buat Agenda
                    </button>
                    
                    <span class="sk sk--divider"></span>
                    
                    <p class="menu-title">AGENDA HARI INI</p>
                    <div id="widget-agenda">
                        <!-- Agenda dirender oleh JS nanti -->
                        <span class="sk-row"><span class="sk sk--dot"></span><span class="sk sk--bar sk--grow sk--dim"></span></span>
                        <span class="sk-row"><span class="sk sk--dot"></span><span class="sk sk--bar sk--grow sk--dim"></span></span>
                    </div>
                </div>
            </aside>

            <!-- REGION: FOOTER -->
            <footer class="region region--footer">
                <div class="footer__status online">
                    <span class="status-indicator"></span>
                    <span id="network-status">Online - Terhubung ke Server</span>
                </div>
                <span class="sk--spacer"></span>
                <span class="footer__copyright">© 2026 Management RQ Kamila V3.1.0</span>
            </footer>
            
        </div>
    </div>

    <!-- Script Utama (Menggunakan type="module" untuk mendukung export/import) -->
    <!-- Penamaan file router dan main kita panggil disini -->
    <script type="module" src="js/router.js"></script>

</body>
</html>
